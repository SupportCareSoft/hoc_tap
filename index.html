<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toán Chibi - Firebase Cloud</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #fdfdfd;
            --box-num: #FFD54F;
            --correct: #4CAF50;
            --wrong: #F44336;
            --primary: #2196F3;
            --secondary: #9c27b0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
            margin: 0;
        }

        .header { text-align: center; margin-bottom: 25px; }
        
        .main-layout {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            width: 100%;
            max-width: 1300px;
            gap: 20px;
        }

        .chibi-side { width: 180px; flex-shrink: 0; text-align: center; }
        .chibi-side img { width: 100%; border-radius: 15px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1)); }
        
        .math-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; flex-grow: 1; }
        
        .math-card {
            background: white; padding: 15px; border-radius: 15px;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee;
        }

        .num { font-size: 20px; font-weight: 900; background: var(--box-num); padding: 5px 10px; border-radius: 10px; min-width: 32px; text-align: center; }
        .ans-input { width: 50px; height: 40px; border: 3px solid #eee; border-radius: 10px; text-align: center; font-size: 18px; font-weight: 900; outline: none; }
        .ans-input.correct { border-color: var(--correct); background-color: #f0fff4; }
        .ans-input.wrong { border-color: var(--wrong); background-color: #fff5f5; }

        .btn-group { margin: 30px 0; display: flex; gap: 15px; }
        button, select { padding: 12px 20px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-refresh { background: var(--primary); color: white; }
        .btn-check { background: var(--correct); color: white; }

        /* PHẦN LỊCH SỬ CLOUD */
        .history-section {
            width: 100%;
            max-width: 900px;
            background: white;
            padding: 20px;
            border-radius: 20px;
            margin-top: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; font-size: 14px; }
        .status-cloud { color: #2196F3; font-size: 12px; font-weight: normal; float: right; }

        @media (max-width: 1100px) { .chibi-side { display: none; } .math-container { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 500px) { .math-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="header">
        <h2>🚀 Bé Học Toán (Dữ liệu đám mây)</h2>
        <select id="math-type" onchange="generateMath()">
            <option value="kid5">Bé 5 tuổi</option>
            <option value="no-carry">Lớp 1 - Không nhớ</option>
            <option value="carry" selected>Lớp 1 - Có nhớ</option>
        </select>
    </div>

    <div class="main-layout">
        <div class="chibi-side">
            <img src="https://i.ibb.co/TB3TPsD5/anh3.png">
        </div>

        <div class="math-container" id="container"></div>

        <div class="chibi-side">
            <img src="https://i.ibb.co/wZ9Yz65T/anh2.png">
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-refresh" onclick="generateMath()">🔄 Đổi bài</button>
        <button class="btn-check" onclick="checkAndUpload()">✅ Nộp bài & Lưu Cloud</button>
    </div>

    <div class="history-section">
        <h3 style="color: var(--secondary)">☁️ Lịch sử làm bài trên Firebase <span class="status-cloud" id="sync-status">Đang đồng bộ...</span></h3>
        <table>
            <thead>
                <tr>
                    <th>Ngày/Giờ</th>
                    <th>Cấp độ</th>
                    <th>Điểm số</th>
                    <th>Xếp loại</th>
                </tr>
            </thead>
            <tbody id="history-body"></tbody>
        </table>
    </div>

    <script>
        // --- 1. CẤU HÌNH FIREBASE (THAY THÔNG TIN CỦA BẠN VÀO ĐÂY) ---
            const firebaseConfig = {
            apiKey: "AIzaSyAWBs-QTOaRpylR3ysfKvYvIO38VJpNbKk",
            authDomain: "toan-bibon.firebaseapp.com",
            databaseURL: "https://toan-bibon-default-rtdb.firebaseio.com",
            projectId: "toan-bibon",
            storageBucket: "toan-bibon.firebasestorage.app",
            messagingSenderId: "14060225460",
            appId: "1:14060225460:web:d04073d113e7076f3828e1"
        };

        // Khởi tạo Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // --- 2. LOGIC TOÁN HỌC ---
        function generateMath() {
            const type = document.getElementById('math-type').value;
            const container = document.getElementById('container');
            container.innerHTML = "";
            for (let i = 0; i < 20; i++) {
                let n1, n2, op;
                if (type === "kid5") {
                    n1 = Math.floor(Math.random() * 9) + 1;
                    op = Math.random() > 0.5 ? '+' : '-';
                    n2 = op === '+' ? Math.floor(Math.random() * (10 - n1 + 1)) : Math.floor(Math.random() * (n1 + 1));
                } else {
                    n1 = Math.floor(Math.random() * 50) + 10;
                    op = Math.random() > 0.5 ? '+' : '-';
                    n2 = Math.floor(Math.random() * 9) + 1;
                }
                let res = op === '+' ? n1 + n2 : n1 - n2;
                container.innerHTML += `
                    <div class="math-card">
                        <div style="display:flex; align-items:center; gap:5px;">
                            <span class="num">${n1}</span> <b>${op}</b> <span class="num">${n2}</span> <b>=</b>
                            <input type="number" class="ans-input" data-ans="${res}">
                        </div>
                    </div>`;
            }
        }

        // --- 3. LƯU DỮ LIỆU LÊN FIREBASE ---
        function checkAndUpload() {
            let correct = 0;
            const inputs = document.querySelectorAll('.ans-input');
            inputs.forEach(input => {
                if (parseInt(input.value) === parseInt(input.dataset.ans)) {
                    input.classList.add('correct'); correct++;
                } else {
                    input.classList.add('wrong');
                }
            });

            const typeText = document.getElementById('math-type').selectedOptions[0].text;
            const now = new Date();
            const timeStr = now.toLocaleString('vi-VN');

            const record = {
                timestamp: Date.now(),
                time: timeStr,
                level: typeText,
                score: `${correct}/20`,
                rank: correct === 20 ? "Xuất sắc! 🏆" : (correct >= 15 ? "Giỏi! 👍" : "Cố lên 💪")
            };

            // Đẩy lên Firebase
            database.ref('history').push(record)
                .then(() => alert("Đã lưu kết quả lên Cloud!"))
                .catch(err => console.error("Lỗi lưu Cloud: ", err));
        }

        // --- 4. LẤY DỮ LIỆU TỪ FIREBASE ---
        database.ref('history').orderByChild('timestamp').limitToLast(10).on('value', (snapshot) => {
            const tbody = document.getElementById('history-body');
            tbody.innerHTML = "";
            const data = [];
            snapshot.forEach(child => { data.push(child.val()); });
            data.reverse().forEach(h => {
                tbody.innerHTML += `
                    <tr>
                        <td>${h.time}</td>
                        <td>${h.level}</td>
                        <td style="font-weight:bold; color:#4CAF50">${h.score}</td>
                        <td>${h.rank}</td>
                    </tr>`;
            });
            document.getElementById('sync-status').innerText = "☁️ Đã đồng bộ";
        });

        window.onload = generateMath;
    </script>
</body>
</html>
