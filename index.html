<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toán Học Chibi Vui Nhộn</title>
    <style>
        :root {
            --bg: #f0f7ff;
            --box-num: #FFD54F;
            --correct: #4CAF50;
            --wrong: #F44336;
            --primary: #2196F3;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px 10px;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
        }

        h2 { color: #2c3e50; margin-bottom: 15px; }

        /* KHUNG CHỨA TOÀN BỘ: CHIBI - BẢNG - CHIBI */
        .main-layout {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 1300px;
            gap: 20px;
        }

        .chibi-side {
            width: 180px;
            flex-shrink: 0;
            text-align: center;
        }

        .chibi-side img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }

        .chibi-text {
            display: block;
            margin-top: 10px;
            font-weight: bold;
            color: #5a67d8;
            font-size: 14px;
            background: white;
            padding: 5px 10px;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* KHUNG BẢNG TÍNH */
        .math-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            flex-grow: 1;
        }

        .math-card {
            background: white;
            padding: 18px 8px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            transition: transform 0.2s;
        }

        .math-card:hover { transform: translateY(-3px); }

        .equation {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
        }

        .num {
            font-size: 20px;
            font-weight: 900;
            background: var(--box-num);
            padding: 5px 10px;
            border-radius: 10px;
            min-width: 35px;
            text-align: center;
            color: #444;
        }

        .op-sign { font-size: 18px; font-weight: bold; color: #718096; }

        .ans-input {
            width: 55px;
            height: 42px;
            border: 3px solid #edf2f7;
            border-radius: 10px;
            text-align: center;
            font-size: 18px;
            font-weight: 900;
            outline: none;
            transition: all 0.2s;
        }

        .ans-input:focus { border-color: var(--primary); }

        .error-msg {
            font-size: 10px;
            color: var(--wrong);
            margin-top: 8px;
            font-weight: bold;
            height: 12px;
            visibility: hidden;
        }

        /* Trạng thái đúng sai */
        .ans-input.correct { border-color: var(--correct); background-color: #f0fff4; }
        .ans-input.wrong { border-color: var(--wrong); background-color: #fff5f5; animation: shake 0.3s; }
        .ans-input.wrong + .error-msg { visibility: visible; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .btn-group { margin-top: 30px; display: flex; gap: 15px; }

        button, select {
            padding: 12px 25px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: opacity 0.2s;
        }

        button:active { opacity: 0.8; }
        .btn-refresh { background: var(--primary); color: white; }
        .btn-check { background: var(--correct); color: white; }

        /* Mobile */
        @media (max-width: 1100px) {
            .chibi-side { display: none; } /* Ẩn chibi trên màn hình hẹp để tránh lệch */
            .math-container { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 500px) {
            .math-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>✨ Bé Tập Làm Toán ✨</h2>
        <select id="math-type" onchange="generateMath()">
            <option value="kid5">Bé 5 tuổi (Phạm vi 10)</option>
            <option value="no-carry">Lớp 1 - Không nhớ</option>
            <option value="carry" selected>Lớp 1 - Có nhớ (Khó)</option>
        </select>
    </div>

    <div class="main-layout">
        <div class="chibi-side">
            <img src="https://i.ibb.co/TB3TPsD5/anh3.png" alt="Boy Chibi">
            <span class="chibi-text">Cùng học nào!</span>
        </div>

        <div class="math-container" id="container"></div>

        <div class="chibi-side">
            <img src="https://i.ibb.co/wZ9Yz65T/anh2.png" alt="Girl Chibi">
            <span class="chibi-text">Bé giỏi quá!</span>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-refresh" onclick="generateMath()">🔄 Đổi bài mới</button>
        <button class="btn-check" onclick="checkResults()">✅ Kiểm tra bài</button>
    </div>

    <script>
        function generateMath() {
            const type = document.getElementById('math-type').value;
            const container = document.getElementById('container');
            container.innerHTML = "";

            for (let i = 0; i < 20; i++) {
                let n1, n2, opSign, result;

                if (type === "kid5") {
                    n1 = Math.floor(Math.random() * 9) + 1;
                    opSign = Math.random() > 0.5 ? '+' : '-';
                    n2 = (opSign === '+') ? Math.floor(Math.random() * (10 - n1 + 1)) : Math.floor(Math.random() * (n1 + 1));
                } else if (type === "no-carry") {
                    n1 = Math.floor(Math.random() * 60) + 10;
                    opSign = Math.random() > 0.5 ? '+' : '-';
                    let d1 = n1 % 10;
                    n2 = (opSign === '+') ? Math.floor(Math.random() * (9 - d1 + 1)) : Math.floor(Math.random() * (d1 + 1));
                } else {
                    opSign = Math.random() > 0.5 ? '+' : '-';
                    if (opSign === '+') {
                        n1 = Math.floor(Math.random() * 30) + 9;
                        let d1 = n1 % 10;
                        n2 = Math.floor(Math.random() * 8) + (10 - d1);
                    } else {
                        n1 = Math.floor(Math.random() * 30) + 11;
                        let d1 = n1 % 10;
                        n2 = Math.floor(Math.random() * 9) + 1;
                        if (n2 <= d1) n2 = d1 + 1;
                    }
                }

                result = (opSign === '+') ? n1 + n2 : n1 - n2;

                container.innerHTML += `
                    <div class="math-card">
                        <div class="equation">
                            <span class="num">${n1}</span>
                            <span class="op-sign">${opSign}</span>
                            <span class="num">${n2}</span>
                            <span class="op-sign">=</span>
                            <input type="number" class="ans-input" data-ans="${result}">
                        </div>
                        <div class="error-msg">Sửa lại nhé! ❌</div>
                    </div>
                `;
            }
        }

        function checkResults() {
            document.querySelectorAll('.ans-input').forEach(input => {
                const val = input.value;
                const ans = input.dataset.ans;
                input.classList.remove('correct', 'wrong');
                if (val !== "") {
                    if (parseInt(val) === parseInt(ans)) {
                        input.classList.add('correct');
                    } else {
                        input.classList.add('wrong');
                    }
                }
            });
        }

        window.onload = generateMath;
    </script>
</body>
</html>
